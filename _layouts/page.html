---
layout: default
---
<section class="page-section">
  <div class="wrap narrow">
    {% if page.title %}
      <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
          <p class="page-description">{{ page.description }}</p>
        {% endif %}
      </header>
    {% endif %}
    <div class="page-content">
      {{ content }}
    </div>
  </div>
</section>
